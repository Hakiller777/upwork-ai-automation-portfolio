version: "3.9"

services:
  document-processor:
    build: .
    container_name: document-processing-pipeline
    env_file:
      - .env
    ports:
      - "8002:8002"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - automation-net
    restart: on-failure

networks:
  automation-net:
    name: automation-net
    driver: bridge
