version: "3.9"

services:
  lead-pipeline:
    build: .
    container_name: lead-generation-pipeline
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - automation-net
    restart: on-failure

  postgres:
    image: postgres:15-alpine
    container_name: lead-postgres
    environment:
      POSTGRES_DB: leads
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d leads"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - automation-net

volumes:
  postgres_data:

networks:
  automation-net:
    name: automation-net
    driver: bridge
